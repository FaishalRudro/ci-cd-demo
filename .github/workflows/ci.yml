name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install pytest
      run: pip install pytest

    - name: Run tests
      run: pytest test_app.py -v

    - name: Run app
      run: python app.py

    - name: Deploy
      run: echo "All tests passed! Deploying..."